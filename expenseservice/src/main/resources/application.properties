# ================= KAFKA =================
spring.kafka.bootstrap-servers=localhost:9092

spring.kafka.consumer.group-id=expense-info-consumer-group
spring.kafka.consumer.auto-offset-reset=earliest

spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
# ? Custom deserializer use karo ? type header issue nahi aayega
spring.kafka.consumer.value-deserializer=com.expense.service.consumer.ExpenseDeserializer

spring.kafka.topic-json.name=expense_service

# ================= DATABASE =================
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://localhost:3306/expenseservice?useSSL=false&useUnicode=yes&characterEncoding=UTF-8&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=kishan

# ================= JPA =================
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ================= HIKARI =================
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=10

# ================= SERVER =================
server.port=9820
spring.application.name=expense-service

# ================= LOGGING =================
logging.level.org.apache.kafka=DEBUG
logging.level.org.springframework.kafka=DEBUG