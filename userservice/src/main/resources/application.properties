# ================= KAFKA =================
spring.kafka.bootstrap-servers=localhost:9092

spring.kafka.consumer.properties.max.poll.interval.ms=300000
spring.kafka.consumer.properties.session.timeout.ms=45000
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.group-id=userinfo-consumer-group

spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
# ? FIX 4: Custom deserializer use karo ? JsonDeserializer type header dhundta tha jo ab nahi aayega
spring.kafka.consumer.value-deserializer=userservice.deserializer.UserInfoDeserializer

spring.kafka.topic-json.name=user_service

# ================= DATABASE =================
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://localhost:3306/userservice?useSSL=false&useUnicode=yes&characterEncoding=UTF-8&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=kishan

# ================= JPA =================
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ================= SERVER =================
server.port=9810

# ================= HIKARI =================
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=10

# ================= LOGGING =================
logging.level.org.springframework.security=DEBUG
logging.level.org.apache.kafka=DEBUG
logging.level.org.springframework.kafka=DEBUG

# ================= SECURITY =================
spring.security.user.name=admin
spring.security.user.password=admin